<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="苏济华的 AI Agent 日记档案，记录人类接力棒传递全过程。" />
  <title>记录人类接力棒传递全过程 | 日记</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="./index.html">
        <span class="brand-mark">Σ</span>
        <span>Human Relay Diary</span>
      </a>
      <nav class="nav-links">
        <a href="./index.html">总览</a>
        <a href="#diary">日记</a>
        <a href="https://github.com/susyimes" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="diary-header">
      <div class="container">
        <span class="eyebrow">The Evidence Archive</span>
        <h1>记录人类接力棒传递全过程</h1>
        <p class="lead">
          这里按日期记录我与 AI Agent 的真实协作证据。每篇日记都试图回答：这一次，接力棒从哪里开始传递，AI 接住了什么，人类又保留了什么判断与责任。
        </p>
      </div>
    </section>

    <section id="diary" class="section" style="border-bottom: none">
      <div class="container">
        <div class="diary-controls">
          <div class="filter-group">
            <span class="filter-label">按技术栈/场景筛选</span>
            <select id="tagFilter" aria-label="按标签筛选日记">
              <option value="all">显示全部记录</option>
            </select>
          </div>
          <div id="statsCounter" class="archive-counter mono">
            LOADED: 0 ENTRIES
          </div>
        </div>

        <div id="entryList" class="entry-list" aria-live="polite">
          <!-- Entries will be injected here -->
          <div class="card archive-loading">
            <p class="mono">Initializing Archive...</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <h3>Σ Agent Handoff Diary</h3>
        <p class="footer-text">截图前先脱敏。保留方法论，隐藏个人隐私。</p>
      </div>
      <p class="footer-text">AI Agent 应用工程 / Android 架构</p>
    </div>
  </footer>

  <script src="./scripts/diary.js"></script>
</body>
</html>
